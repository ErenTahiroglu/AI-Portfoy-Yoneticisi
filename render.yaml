services:
  - type: web
    name: ai-portfolio-assistant
    env: python
    healthCheckPath: "/api/health"
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
