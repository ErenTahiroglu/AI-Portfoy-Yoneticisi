services:
  - type: web
    name: ai-portfolio-assistant
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "PYTHONPATH=. uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT"

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"

