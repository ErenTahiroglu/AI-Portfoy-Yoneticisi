name: CI/CD Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MOCK_LLM: true

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Trufflehog needs full history
      
      - name: TruffleHog Secret Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified

  lint:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install JS dependencies
        run: npm install

      - name: Run ESLint (JS Verification)
        run: npm run lint:js

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Linters
        run: |
          pip install ruff pyright
          pip install -r backend/requirements.txt          
      - name: Run Ruff Linter
        run: npm run lint:py

      - name: Run Pyright Type Checker
        run: pyright backend/

  test-core:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio psutil pytest-socket httpx pandas numpy langchain-community

      - name: Run Core Financial & Logic Tests (Zero-Trust Locked)
        run: |
          PYTHONPATH=. python -m pytest backend/tests/test_financial_integrity.py backend/tests/test_decimal_precision_v3.py backend/tests/test_logic_hardening.py -v --disable-socket --allow-hosts=127.0.0.1,localhost

  test-chaos:
    needs: test-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Execution Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio psutil pytest-socket httpx

      - name: Run Resilience & Chaos Tests (Rate Limiter, Circuit Breaker)
        run: |
          PYTHONPATH=. python -m pytest backend/tests/test_chaos_engineering.py backend/tests/test_chaos_resilience.py backend/tests/test_sre_firewall.py -v
