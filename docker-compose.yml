version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    environment:
      - ENVIRONMENT=development
    restart: unless-stopped

  # Frontend is served by the backend or separately (Vercel)
  # To run locally with full stack:
  # frontend:
  #   image: nginx:alpine
  #   volumes:
  #     - ./frontend:/usr/share/nginx/html
  #   ports:
  #     - "3000:80"

